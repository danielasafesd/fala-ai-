<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fala Aí — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: #0E0E0F; color: #F0EEE8; min-height: 100vh; }
  .app { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
  .adm-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
  .adm-header h1 { font-size: 20px; font-weight: 600; color: #F0EEE8; letter-spacing: -0.3px; }
  .adm-header h1 span { color: #C8F04E; }
  .adm-header p { font-size: 12px; color: #999891; margin-top: 3px; font-weight: 300; }
  .refresh { background: #181819; border: 1px solid rgba(255,255,255,0.12); color: #999891; font-size: 12px; padding: 6px 14px; border-radius: 99px; cursor: pointer; font-family: 'Poppins', sans-serif; transition: color 0.2s; }
  .refresh:hover { color: #F0EEE8; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #181819; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px 16px; }
  .stat-num { font-size: 28px; font-weight: 600; color: #C8F04E; line-height: 1; }
  .stat-lbl { font-size: 10px; color: #555450; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 400; }
  .empty { text-align: center; padding: 80px 0; color: #555450; font-size: 14px; }
  .session { background: #181819; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
  .sess-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; transition: background 0.15s; }
  .sess-head:hover { background: #222224; }
  .sess-meta { display: flex; align-items: center; gap: 14px; }
  .sess-date { font-size: 13px; color: #F0EEE8; font-weight: 500; }
  .sess-count { font-size: 11px; color: #555450; font-weight: 300; }
  .chips { display: flex; gap: 6px; align-items: center; }
  .chip { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 99px; }
  .chip-g { color: #4EF09A; background: rgba(78,240,154,0.08); border: 1px solid rgba(78,240,154,0.2); }
  .chip-o { color: #F0C84E; background: rgba(240,200,78,0.08); border: 1px solid rgba(240,200,78,0.2); }
  .chip-r { color: #F06B4E; background: rgba(240,107,78,0.08); border: 1px solid rgba(240,107,78,0.2); }
  .chevron { font-size: 14px; color: #555450; transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .sess-body { display: none; border-top: 1px solid rgba(255,255,255,0.07); }
  .sess-body.open { display: block; }
  .q-block { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .q-block:last-child { border-bottom: none; }
  .q-lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #555450; margin-bottom: 6px; }
  .q-text { font-size: 13px; font-weight: 400; color: #F0EEE8; line-height: 1.6; margin-bottom: 10px; }
  .ans { background: #222224; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #999891; margin-bottom: 10px; border-left: 2px solid rgba(255,255,255,0.12); font-weight: 300; }
  .badges { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 99px; border: 1px solid; }
  .badge-g { color: #4EF09A; border-color: rgba(78,240,154,0.25); background: rgba(78,240,154,0.06); }
  .badge-o { color: #F0C84E; border-color: rgba(240,200,78,0.25); background: rgba(240,200,78,0.06); }
  .badge-r { color: #F06B4E; border-color: rgba(240,107,78,0.25); background: rgba(240,107,78,0.06); }
  .badge-s { color: #555450; border-color: rgba(85,84,80,0.25); background: rgba(85,84,80,0.06); }
  .chip-s { color: #555450; background: rgba(85,84,80,0.08); border: 1px solid rgba(85,84,80,0.2); }
  .skipped-block { opacity: 0.5; }
  .ai-lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #555450; margin-bottom: 5px; }
  .ai-text { font-size: 12px; color: #999891; line-height: 1.7; padding: 10px 12px; background: rgba(200,240,78,0.04); border: 1px solid rgba(200,240,78,0.1); border-radius: 10px; font-weight: 300; }
  .summary-block { margin: 0 18px 16px; background: #222224; border-radius: 10px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.07); }
  .sum-title { font-size: 15px; font-weight: 600; color: #C8F04E; margin-bottom: 6px; }
  .sum-lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #555450; margin: 10px 0 4px; }
  .sum-text { font-size: 12px; color: #999891; line-height: 1.7; font-weight: 300; }
  .loading { text-align: center; padding: 60px 0; color: #555450; font-size: 14px; }
  .dots { display: inline-flex; gap: 4px; margin-right: 8px; }
  .dots span { width: 5px; height: 5px; border-radius: 50%; background: #C8F04E; animation: pulse 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-in { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>
<div class="app">
  <div class="adm-header">
    <div>
      <h1>Fala <span>aí</span> — Admin</h1>
      <p>Sessões e respostas registradas</p>
    </div>
    <button class="refresh" onclick="loadSessions()">↻ Atualizar</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">Sessões totais</div></div>
    <div class="stat"><div class="stat-num" id="stat-respostas">—</div><div class="stat-lbl">Respostas analisadas</div></div>
    <div class="stat"><div class="stat-num" id="stat-boas">—</div><div class="stat-lbl">Aberturas boas</div></div>
  </div>

  <div id="sessions-list">
    <div class="loading"><span class="dots"><span></span><span></span><span></span></span> Carregando sessões...</div>
  </div>
</div>

<script>
function scoreClass(val) {
  if (val === "boa" || val === "bom") return "badge-g";
  if (val === "média" || val === "neutro") return "badge-o";
  return "badge-r";
}
function scoreLabel(key, val) {
  const m = {
    abertura: { boa:"Abre conversa", média:"Abre um pouco", baixa:"Fecha conversa" },
    especificidade: { boa:"Específica", média:"Genérica", baixa:"Vaga" },
    tom: { bom:"Tom aberto", neutro:"Tom neutro", fechado:"Tom fechado" }
  };
  return m[key]?.[val] || val;
}
function chipClass(val) {
  if (val === "boa" || val === "bom") return "chip-g";
  if (val === "média" || val === "neutro") return "chip-o";
  return "chip-r";
}
function formatDate(id) {
  const ts = parseInt(id.replace("session:", ""));
  if (isNaN(ts)) return "—";
  return new Date(ts).toLocaleString("pt-BR", { day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit" });
}
function countBoas(results) {
  return (results || []).filter(r => r.abertura === "boa").length;
}
function toggle(id) {
  const body = document.getElementById("body-" + id);
  const chev = document.getElementById("chev-" + id);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}
function renderSession(s, index) {
  const results = s.results || [];
  const summary = s.summary || null;
  const boas = results.filter(r => r.abertura === "boa" && !r.skipped).length;
  const medias = results.filter(r => r.abertura === "média" && !r.skipped).length;
  const baixas = results.filter(r => r.abertura === "baixa" && !r.skipped).length;
  const puladas = results.filter(r => r.skipped).length;
  const id = "s" + index;

  const questionsHTML = results.map((r, i) => {
    if (r.skipped) return `
      <div class="q-block skipped-block">
        <div class="q-lbl">Situação ${i+1} · pulada</div>
        <div class="q-text">${r.scenario || ""}</div>
        <div class="badges"><span class="badge badge-s">Pulada</span></div>
      </div>`;
    return `
      <div class="q-block">
        <div class="q-lbl">Situação ${i+1}</div>
        <div class="q-text">${r.scenario || ""}</div>
        <div class="ans">"${r.answer || ""}"</div>
        <div class="badges">
          <span class="badge ${scoreClass(r.abertura)}">${scoreLabel("abertura", r.abertura)}</span>
          <span class="badge ${scoreClass(r.especificidade)}">${scoreLabel("especificidade", r.especificidade)}</span>
          <span class="badge ${scoreClass(r.tom)}">${scoreLabel("tom", r.tom)}</span>
        </div>
        <div class="ai-lbl">Análise da IA</div>
        <div class="ai-text">${r.feedback || ""}</div>
      </div>`;
  }).join("");

  const summaryHTML = summary ? `
    <div class="summary-block">
      <div class="q-lbl" style="margin-bottom:8px">Resumo da sessão</div>
      <div class="sum-title">${summary.titulo || ""}</div>
      <div class="sum-text">${summary.resumo_geral || ""}</div>
      <div class="sum-lbl">Ponto forte</div>
      <div class="sum-text">${summary.ponto_forte || ""}</div>
      <div class="sum-lbl">O que trabalhar</div>
      <div class="sum-text">${summary.ponto_melhorar || ""}</div>
    </div>
  ` : "";

  return `
    <div class="session fade-in">
      <div class="sess-head" onclick="toggle('${id}')">
        <div class="sess-meta">
          <span class="sess-date">${formatDate(s.id)}</span>
          <span class="sess-count">${results.length} respostas</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="chips">
            ${boas > 0 ? `<span class="chip chip-g">${boas} boas</span>` : ""}
            ${medias > 0 ? `<span class="chip chip-o">${medias} médias</span>` : ""}
            ${baixas > 0 ? `<span class="chip chip-r">${baixas} baixas</span>` : ""}
            ${puladas > 0 ? `<span class="chip chip-s">${puladas} puladas</span>` : ""}
          </div>
          <span class="chevron" id="chev-${id}">▾</span>
        </div>
      </div>
      <div class="sess-body" id="body-${id}">
        ${questionsHTML}
        ${summaryHTML}
      </div>
    </div>`;
}

async function loadSessions() {
  document.getElementById("sessions-list").innerHTML = `<div class="loading"><span class="dots"><span></span><span></span><span></span></span> Carregando sessões...</div>`;
  try {
    const res = await fetch("/api/get-sessions");
    const sessions = await res.json();
    if (!sessions.length) {
      document.getElementById("sessions-list").innerHTML = `<div class="empty">Nenhuma sessão registrada ainda.</div>`;
      document.getElementById("stat-total").textContent = "0";
      document.getElementById("stat-respostas").textContent = "0";
      document.getElementById("stat-boas").textContent = "0";
      return;
    }
    const totalRespostas = sessions.reduce((acc, s) => acc + (s.results || []).length, 0);
    const totalBoas = sessions.reduce((acc, s) => acc + countBoas(s.results || []), 0);
    document.getElementById("stat-total").textContent = sessions.length;
    document.getElementById("stat-respostas").textContent = totalRespostas;
    document.getElementById("stat-boas").textContent = totalBoas;
    document.getElementById("sessions-list").innerHTML = sessions.map((s, i) => renderSession(s, i)).join("");
  } catch(e) {
    document.getElementById("sessions-list").innerHTML = `<div class="empty">Erro ao carregar sessões.</div>`;
  }
}

loadSessions();
</script>
</body>
</html>
